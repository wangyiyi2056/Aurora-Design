[project]
name = "chatbi-ext"
version = "0.1.0"
description = "ChatBI extension capabilities"
requires-python = ">=3.10"
dependencies = [
    "chatbi-core",
    "chromadb>=0.5",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/chatbi_ext"]
