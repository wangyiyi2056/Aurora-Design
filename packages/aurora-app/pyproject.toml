[project]
name = "aurora-app"
version = "0.1.0"
description = "Aurora application entrypoint"
requires-python = ">=3.10"
dependencies = [
    "aurora-serve",
    "aurora-ext",
]

[project.scripts]
aurora = "aurora_app.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aurora_app"]
