[project]
name = "aurora-ext"
version = "0.1.0"
description = "Aurora extension capabilities"
requires-python = ">=3.10"
dependencies = [
    "aurora-core",
    "chromadb>=0.5",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aurora_ext"]
