[project]
name = "aurora-ext"
version = "0.1.0"
description = "Aurora extension capabilities"
requires-python = ">=3.10"
dependencies = [
    "aurora-core",
    "chromadb>=0.5",
    "networkx>=3.0",
    "nano-vectordb>=0.0.4",
    "json-repair>=0.1",
    "tenacity>=8.0",
    "pypdf>=4.0",
    "python-docx>=1.0",
    "python-pptx>=0.6.23",
    "langchain-text-splitters>=0.3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aurora_ext"]
