[project]
name = "aurora-ext"
version = "0.1.0"
description = "Aurora extension capabilities"
requires-python = ">=3.10"
dependencies = [
    "aurora-core",
    "chromadb>=0.5",
    "networkx>=3.0",
    "nano-vectordb>=0.0.4",
    "json-repair>=0.1",
    "tenacity>=8.0",
    "pypdf>=4.0",
    "python-docx>=1.0",
    "python-pptx>=0.6.23",
    "langchain-text-splitters>=0.3",
]

[project.optional-dependencies]
postgres = ["psycopg[binary,pool]>=3.1"]
neo4j = ["neo4j>=5.0"]
milvus = ["pymilvus>=2.3"]
redis = ["redis[hiredis]>=5.0"]
mongo = ["motor>=3.3", "pymongo>=4.6"]
opensearch = ["opensearch-py[async]>=2.4"]
qdrant = ["qdrant-client>=1.7"]
faiss = ["faiss-cpu>=1.7"]
memgraph = ["neo4j>=5.0"]
mineru = ["magic-pdf>=0.9", "aiohttp>=3.9"]
docling = ["docling>=2.0"]
ragas = [
    "ragas>=0.1.0,<0.3",
    "datasets>=2.14",
    "langchain-core>=0.1",
]
all = [
    "psycopg[binary,pool]>=3.1",
    "neo4j>=5.0",
    "pymilvus>=2.3",
    "redis[hiredis]>=5.0",
    "motor>=3.3",
    "pymongo>=4.6",
    "opensearch-py[async]>=2.4",
    "qdrant-client>=1.7",
    "faiss-cpu>=1.7",
    "magic-pdf>=0.9",
    "aiohttp>=3.9",
    "docling>=2.0",
    "ragas>=0.1.0,<0.3",
    "datasets>=2.14",
    "langchain-core>=0.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aurora_ext"]
