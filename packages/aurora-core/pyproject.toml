[project]
name = "aurora-core"
version = "0.1.0"
description = "Aurora core framework"
requires-python = ">=3.10"
dependencies = [
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
    "tomli>=2.0 ; python_version < '3.11'",
    "openai>=1.30",
    "sqlalchemy>=2.0",
    "psycopg2-binary>=2.9",
    "pymysql>=1.1",
    "duckdb>=0.10",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aurora_core"]
