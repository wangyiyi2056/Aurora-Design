[project]
name = "chatbi-app"
version = "0.1.0"
description = "ChatBI application entrypoint"
requires-python = ">=3.10"
dependencies = [
    "chatbi-serve",
    "chatbi-ext",
]

[project.scripts]
chatbi = "chatbi_app.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/chatbi_app"]
