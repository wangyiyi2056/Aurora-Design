# ──────────────────────────────────────────────────────────────────────
# Aurora — Full Stack Docker Compose
#
# Services: aurora-app + postgres + neo4j + milvus + redis
#
# Usage:
#   docker compose -f docker-compose.full.yml up -d
#   docker compose -f docker-compose.full.yml logs -f aurora-app
#
# The app is available at http://localhost:8080
# ──────────────────────────────────────────────────────────────────────

services:
  # ── Aurora Application ──────────────────────────────────────────────
  aurora-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aurora-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - AURORA_PORT=8888
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # PostgreSQL (knowledge storage backend)
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=aurora
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-aurora_secret}
      - POSTGRES_DB=aurora
      # Neo4j (knowledge graph backend)
      - NEO4J_HOST=neo4j
      - NEO4J_PORT=7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-aurora_neo4j}
      # Milvus (vector store backend)
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      # Redis (cache + session store)
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - aurora-data:/app/data
      - aurora-uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      milvus:
        condition: service_started
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8888/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - aurora-net

  # ── PostgreSQL — Structured storage for KV and DocStatus ────────────
  postgres:
    image: postgres:16-alpine
    container_name: aurora-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=aurora
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-aurora_secret}
      - POSTGRES_DB=aurora
    volumes:
      - postgres-data:/var/lib/postgresql/data
    command: >
      postgres
        -c shared_preload_libraries=pg_stat_statements
        -c max_connections=200
        -c shared_buffers=256MB
        -c effective_cache_size=512MB
        -c work_mem=16MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aurora"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aurora-net

  # ── Neo4j — Knowledge graph storage ─────────────────────────────────
  neo4j:
    image: neo4j:5-community
    container_name: aurora-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-aurora_neo4j}
      - NEO4J_PLUGINS=[]
      - NEO4J_server_memory_heap_initial__size=256m
      - NEO4J_server_memory_heap_max__size=512m
      - NEO4J_server_memory_pagecache_size=256m
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p $${NEO4J_PASSWORD:-aurora_neo4j} 'RETURN 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - aurora-net

  # ── Milvus — Vector database (standalone) ───────────────────────────
  etcd:
    image: quay.io/coreos/etcd:v3.5.16
    container_name: aurora-etcd
    restart: unless-stopped
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd-data:/etcd
    command: etcd --advertise-client-urls=http://127.0.0.1:2379 --listen-client-urls=http://0.0.0.0:2379 --data-dir=/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - aurora-net

  minio:
    image: minio/minio:RELEASE.2024-04-18T19-09-19Z
    container_name: aurora-minio
    restart: unless-stopped
    environment:
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    ports:
      - "9001:9001"   # Console
    volumes:
      - minio-data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - aurora-net

  milvus:
    image: milvusdb/milvus:v2.4.17
    container_name: aurora-milvus
    restart: unless-stopped
    ports:
      - "19530:19530"  # gRPC
      - "9091:9091"    # Metrics
    environment:
      - ETCD_ENDPOINTS=etcd:2379
      - MINIO_ADDRESS=minio:9000
    volumes:
      - milvus-data:/var/lib/milvus
    command: ["milvus", "run", "standalone"]
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 90s
    networks:
      - aurora-net

  # ── Redis — Cache and session store ─────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aurora-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aurora-net

volumes:
  aurora-data:
    driver: local
  aurora-uploads:
    driver: local
  postgres-data:
    driver: local
  neo4j-data:
    driver: local
  neo4j-logs:
    driver: local
  etcd-data:
    driver: local
  minio-data:
    driver: local
  milvus-data:
    driver: local
  redis-data:
    driver: local

networks:
  aurora-net:
    driver: bridge
