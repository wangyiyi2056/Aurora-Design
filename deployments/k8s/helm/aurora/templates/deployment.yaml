apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aurora.fullname" . }}
  labels:
    {{- include "aurora.labels" . | nindent 4 }}
    app.kubernetes.io/component: app
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "aurora.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: app
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        {{- include "aurora.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: app
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "aurora.serviceAccountName" . }}
      terminationGracePeriodSeconds: 30

      {{- if or .Values.postgresql.enabled .Values.redis.enabled }}
      initContainers:
        {{- if .Values.postgresql.enabled }}
        - name: wait-for-postgres
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z {{ include "aurora.fullname" . }}-postgres 5432; do echo 'Waiting for PostgreSQL...'; sleep 2; done"]
          timeoutSeconds: 120
        {{- end }}
        {{- if .Values.redis.enabled }}
        - name: wait-for-redis
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z {{ include "aurora.fullname" . }}-redis 6379; do echo 'Waiting for Redis...'; sleep 2; done"]
          timeoutSeconds: 60
        {{- end }}
      {{- end }}

      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: backend
              containerPort: {{ .Values.app.port }}
              protocol: TCP

          envFrom:
            - configMapRef:
                name: {{ include "aurora.fullname" . }}-config
          env:
            {{- if .Values.externalSecrets.enabled }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalSecrets.name }}
                  key: OPENAI_API_KEY
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalSecrets.name }}
                  key: ANTHROPIC_API_KEY
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalSecrets.name }}
                  key: POSTGRES_PASSWORD
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalSecrets.name }}
                  key: NEO4J_PASSWORD
            {{- else }}
            {{- if .Values.secrets.openaiApiKey }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "aurora.fullname" . }}-secrets
                  key: OPENAI_API_KEY
            {{- end }}
            {{- if .Values.secrets.anthropicApiKey }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "aurora.fullname" . }}-secrets
                  key: ANTHROPIC_API_KEY
            {{- end }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "aurora.fullname" . }}-secrets
                  key: POSTGRES_PASSWORD
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "aurora.fullname" . }}-secrets
                  key: NEO4J_PASSWORD
            {{- end }}
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}

          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: backend
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}

          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: backend
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}

          startupProbe:
            httpGet:
              path: /api/v1/health
              port: backend
            initialDelaySeconds: {{ .Values.probes.startup.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}

          volumeMounts:
            {{- if .Values.persistence.data.enabled }}
            - name: aurora-data
              mountPath: /app/data
            {{- end }}
            {{- if .Values.persistence.uploads.enabled }}
            - name: aurora-uploads
              mountPath: /app/uploads
            {{- end }}
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf

      volumes:
        {{- if .Values.persistence.data.enabled }}
        - name: aurora-data
          persistentVolumeClaim:
            claimName: {{ include "aurora.fullname" . }}-data
        {{- end }}
        {{- if .Values.persistence.uploads.enabled }}
        - name: aurora-uploads
          persistentVolumeClaim:
            claimName: {{ include "aurora.fullname" . }}-uploads
        {{- end }}
        - name: nginx-config
          configMap:
            name: {{ include "aurora.fullname" . }}-config
            items:
              - key: nginx.conf
                path: nginx.conf

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
