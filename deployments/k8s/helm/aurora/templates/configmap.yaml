apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "aurora.fullname" . }}-config
  labels:
    {{- include "aurora.labels" . | nindent 4 }}
data:
  AURORA_PORT: {{ .Values.app.port | quote }}
  AURORA_LOG_LEVEL: {{ .Values.app.logLevel | quote }}
  AURORA_ENV: {{ .Values.app.environment | quote }}

  {{- if .Values.postgresql.enabled }}
  POSTGRES_HOST: {{ include "aurora.fullname" . }}-postgres
  POSTGRES_PORT: "5432"
  POSTGRES_USER: "aurora"
  POSTGRES_DB: "aurora"
  {{- end }}

  {{- if .Values.neo4j.enabled }}
  NEO4J_HOST: {{ include "aurora.fullname" . }}-neo4j
  NEO4J_PORT: "7687"
  NEO4J_USER: "neo4j"
  {{- end }}

  {{- if .Values.milvus.enabled }}
  MILVUS_HOST: {{ include "aurora.fullname" . }}-milvus
  MILVUS_PORT: "19530"
  {{- end }}

  {{- if .Values.redis.enabled }}
  REDIS_HOST: {{ include "aurora.fullname" . }}-redis
  REDIS_PORT: "6379"
  {{- end }}

  nginx.conf: |
    worker_processes auto;
    pid /tmp/nginx/nginx.pid;
    error_log /var/log/nginx/error.log warn;

    events {
      worker_connections 1024;
    }

    http {
      include       /etc/nginx/mime.types;
      default_type  application/octet-stream;
      sendfile      on;
      tcp_nopush    on;
      keepalive_timeout 65;
      client_max_body_size 100m;
      access_log /var/log/nginx/access.log;

      upstream backend {
        server 127.0.0.1:{{ .Values.app.port }};
      }

      server {
        listen 8080;
        server_name _;
        root /app/frontend/dist;
        index index.html;

        location /api/ {
          proxy_pass http://backend;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_read_timeout 300s;
        }

        location / {
          try_files $uri $uri/ /index.html;
        }

        location /healthz {
          access_log off;
          return 200 'ok';
          add_header Content-Type text/plain;
        }
      }
    }
