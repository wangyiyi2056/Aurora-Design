# ──────────────────────────────────────────────────────────────────────
# Aurora Secrets
#
# IMPORTANT: In production, use one of these approaches instead of
# base64-encoded plaintext:
#   - Sealed Secrets (bitnami-labs/sealed-secrets)
#   - External Secrets Operator
#   - HashiCorp Vault integration
#   - kubectl create secret (imperative, not in git)
#
# Generate base64 values:
#   echo -n 'your-secret' | base64
# ──────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: aurora-secrets
  namespace: aurora
  labels:
    app.kubernetes.io/name: aurora
    app.kubernetes.io/component: secrets
type: Opaque
data:
  # Replace these with your actual base64-encoded values before deploying
  # echo -n 'sk-your-openai-key' | base64
  OPENAI_API_KEY: c2steW91ci1vcGVuYWkta2V5
  # echo -n 'your-anthropic-key' | base64
  ANTHROPIC_API_KEY: eW91ci1hbnRocm9waWMta2V5
  # echo -n 'aurora_secret' | base64
  POSTGRES_PASSWORD: YXVyb3JhX3NlY3JldA==
  # echo -n 'aurora_neo4j' | base64
  NEO4J_PASSWORD: YXVyb3JhX25lbzRq
