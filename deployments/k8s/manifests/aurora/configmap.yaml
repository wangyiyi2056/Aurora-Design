apiVersion: v1
kind: ConfigMap
metadata:
  name: aurora-config
  namespace: aurora
  labels:
    app.kubernetes.io/name: aurora
    app.kubernetes.io/component: config
data:
  # ── Application ──────────────────────────────────────────────────────
  AURORA_PORT: "8888"
  AURORA_LOG_LEVEL: "info"
  AURORA_ENV: "production"

  # ── PostgreSQL ───────────────────────────────────────────────────────
  POSTGRES_HOST: "aurora-postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_USER: "aurora"
  POSTGRES_DB: "aurora"

  # ── Neo4j ────────────────────────────────────────────────────────────
  NEO4J_HOST: "aurora-neo4j"
  NEO4J_PORT: "7687"
  NEO4J_USER: "neo4j"

  # ── Milvus ───────────────────────────────────────────────────────────
  MILVUS_HOST: "aurora-milvus"
  MILVUS_PORT: "19530"

  # ── Redis ────────────────────────────────────────────────────────────
  REDIS_HOST: "aurora-redis"
  REDIS_PORT: "6379"

  # ── Nginx configuration (embedded for ConfigMap hot-reload) ─────────
  nginx.conf: |
    worker_processes auto;
    pid /tmp/nginx/nginx.pid;
    error_log /var/log/nginx/error.log warn;

    events {
      worker_connections 1024;
    }

    http {
      include       /etc/nginx/mime.types;
      default_type  application/octet-stream;
      sendfile      on;
      tcp_nopush    on;
      keepalive_timeout 65;
      client_max_body_size 100m;

      access_log /var/log/nginx/access.log;

      upstream backend {
        server 127.0.0.1:8888;
      }

      server {
        listen 8080;
        server_name _;

        root /app/frontend/dist;
        index index.html;

        location /api/ {
          proxy_pass http://backend;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_read_timeout 300s;
        }

        location / {
          try_files $uri $uri/ /index.html;
        }

        location /healthz {
          access_log off;
          return 200 'ok';
          add_header Content-Type text/plain;
        }
      }
    }
