# ──────────────────────────────────────────────────────────────────────
# Aurora Application Deployment
#
# Runs nginx (frontend on :8080) + uvicorn (backend on :8888)
# in a single pod via the multi-stage Docker image.
# ──────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aurora
  namespace: aurora
  labels:
    app.kubernetes.io/name: aurora
    app.kubernetes.io/component: app
    app.kubernetes.io/version: "0.1.0"
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: aurora
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aurora
        app.kubernetes.io/component: app
      annotations:
        # Force pod restart when ConfigMap changes (hash the config)
        checksum/config: "CONFIG_HASH_PLACEHOLDER"
    spec:
      serviceAccountName: default
      terminationGracePeriodSeconds: 30

      # ── Init Containers ────────────────────────────────────────────
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z aurora-postgres 5432; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
          timeoutSeconds: 120
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z aurora-redis 6379; do
                echo "Waiting for Redis..."
                sleep 2
              done
          timeoutSeconds: 60

      # ── Containers ─────────────────────────────────────────────────
      containers:
        - name: aurora
          image: aurora:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: backend
              containerPort: 8888
              protocol: TCP

          # ── Environment (non-secret) ────────────────────────────
          envFrom:
            - configMapRef:
                name: aurora-config

          # ── Environment (secret) ────────────────────────────────
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: aurora-secrets
                  key: OPENAI_API_KEY
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: aurora-secrets
                  key: ANTHROPIC_API_KEY
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aurora-secrets
                  key: POSTGRES_PASSWORD
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aurora-secrets
                  key: NEO4J_PASSWORD

          # ── Health Checks ───────────────────────────────────────
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: backend
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: backend
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /api/v1/health
              port: backend
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12

          # ── Resources ───────────────────────────────────────────
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi

          # ── Security Context ────────────────────────────────────
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

          # ── Volume Mounts ───────────────────────────────────────
          volumeMounts:
            - name: aurora-data
              mountPath: /app/data
            - name: aurora-uploads
              mountPath: /app/uploads
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf

      # ── Volumes ──────────────────────────────────────────────────
      volumes:
        - name: aurora-data
          persistentVolumeClaim:
            claimName: aurora-data
        - name: aurora-uploads
          persistentVolumeClaim:
            claimName: aurora-uploads
        - name: nginx-config
          configMap:
            name: aurora-config
            items:
              - key: nginx.conf
                path: nginx.conf
