# ── ClusterIP Service (internal) ──────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: aurora
  namespace: aurora
  labels:
    app.kubernetes.io/name: aurora
    app.kubernetes.io/component: app
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: aurora
    app.kubernetes.io/component: app
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
    - name: backend
      port: 8888
      targetPort: backend
      protocol: TCP

---
