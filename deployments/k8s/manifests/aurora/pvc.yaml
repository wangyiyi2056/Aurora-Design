# ── Aurora Application Data PVC ────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: aurora-data
  namespace: aurora
  labels:
    app.kubernetes.io/name: aurora
    app.kubernetes.io/component: storage
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 10Gi

---
# ── Aurora Uploads PVC ─────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: aurora-uploads
  namespace: aurora
  labels:
    app.kubernetes.io/name: aurora
    app.kubernetes.io/component: storage
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 20Gi
