# ──────────────────────────────────────────────────────────────────────
# Milvus Distributed Cluster
#
# Components:
#   - etcd (metadata store)
#   - MinIO (object storage)
#   - Milvus (vector database)
#
# For production, consider using the official Milvus Operator:
#   https://milvus.io/docs/install_cluster-milvusoperator.md
# ──────────────────────────────────────────────────────────────────────

# ══════════════════════════════════════════════════════════════════════
# etcd — Metadata store
# ══════════════════════════════════════════════════════════════════════

apiVersion: v1
kind: Service
metadata:
  name: aurora-etcd
  namespace: aurora
  labels:
    app.kubernetes.io/name: aurora-etcd
    app.kubernetes.io/component: milvus-dep
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: aurora-etcd
    app.kubernetes.io/component: milvus-dep
  ports:
    - name: client
      port: 2379
      targetPort: 2379
    - name: peer
      port: 2380
      targetPort: 2380

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: aurora-etcd
  namespace: aurora
  labels:
    app.kubernetes.io/name: aurora-etcd
    app.kubernetes.io/component: milvus-dep
spec:
  serviceName: aurora-etcd
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aurora-etcd
      app.kubernetes.io/component: milvus-dep
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aurora-etcd
        app.kubernetes.io/component: milvus-dep
    spec:
      containers:
        - name: etcd
          image: quay.io/coreos/etcd:v3.5.16
          ports:
            - name: client
              containerPort: 2379
            - name: peer
              containerPort: 2380
          env:
            - name: ETCD_AUTO_COMPACTION_MODE
              value: revision
            - name: ETCD_AUTO_COMPACTION_RETENTION
              value: "1000"
            - name: ETCD_QUOTA_BACKEND_BYTES
              value: "4294967296"
            - name: ETCD_SNAPSHOT_COUNT
              value: "50000"
          command:
            - etcd
            - --advertise-client-urls=http://127.0.0.1:2379
            - --listen-client-urls=http://0.0.0.0:2379
            - --data-dir=/etcd

          livenessProbe:
            exec:
              command: ["etcdctl", "endpoint", "health"]
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 20

          readinessProbe:
            exec:
              command: ["etcdctl", "endpoint", "health"]
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 10

          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

          volumeMounts:
            - name: etcd-data
              mountPath: /etcd

  volumeClaimTemplates:
    - metadata:
        name: etcd-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: standard
        resources:
          requests:
            storage: 5Gi

---
# ══════════════════════════════════════════════════════════════════════
# MinIO — Object storage for Milvus
# ══════════════════════════════════════════════════════════════════════

apiVersion: v1
kind: Secret
metadata:
  name: aurora-minio-secret
  namespace: aurora
  labels:
    app.kubernetes.io/name: aurora-minio
    app.kubernetes.io/component: milvus-dep
type: Opaque
data:
  # echo -n 'minioadmin' | base64
  MINIO_ACCESS_KEY: bWluaW9hZG1pbg==
  MINIO_SECRET_KEY: bWluaW9hZG1pbg==

---
apiVersion: v1
kind: Service
metadata:
  name: aurora-minio
  namespace: aurora
  labels:
    app.kubernetes.io/name: aurora-minio
    app.kubernetes.io/component: milvus-dep
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: aurora-minio
    app.kubernetes.io/component: milvus-dep
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aurora-minio
  namespace: aurora
  labels:
    app.kubernetes.io/name: aurora-minio
    app.kubernetes.io/component: milvus-dep
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aurora-minio
      app.kubernetes.io/component: milvus-dep
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aurora-minio
        app.kubernetes.io/component: milvus-dep
    spec:
      containers:
        - name: minio
          image: minio/minio:RELEASE.2024-04-18T19-09-19Z
          args:
            - server
            - /minio_data
            - --console-address
            - ":9001"
          ports:
            - name: api
              containerPort: 9000
            - name: console
              containerPort: 9001
          env:
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aurora-minio-secret
                  key: MINIO_ACCESS_KEY
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: aurora-minio-secret
                  key: MINIO_SECRET_KEY

          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: api
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 20

          readinessProbe:
            httpGet:
              path: /minio/health/live
              port: api
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 10

          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

          volumeMounts:
            - name: minio-data
              mountPath: /minio_data

      volumes:
        - name: minio-data
          persistentVolumeClaim:
            claimName: aurora-minio-data

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: aurora-minio-data
  namespace: aurora
  labels:
    app.kubernetes.io/name: aurora-minio
    app.kubernetes.io/component: milvus-dep
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 20Gi

---
# ══════════════════════════════════════════════════════════════════════
# Milvus — Vector database (standalone mode)
# ══════════════════════════════════════════════════════════════════════

apiVersion: v1
kind: Service
metadata:
  name: aurora-milvus
  namespace: aurora
  labels:
    app.kubernetes.io/name: aurora-milvus
    app.kubernetes.io/component: vector
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: aurora-milvus
    app.kubernetes.io/component: vector
  ports:
    - name: grpc
      port: 19530
      targetPort: 19530
    - name: metrics
      port: 9091
      targetPort: 9091

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aurora-milvus
  namespace: aurora
  labels:
    app.kubernetes.io/name: aurora-milvus
    app.kubernetes.io/component: vector
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: aurora-milvus
      app.kubernetes.io/component: vector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aurora-milvus
        app.kubernetes.io/component: vector
    spec:
      containers:
        - name: milvus
          image: milvusdb/milvus:v2.4.17
          command: ["milvus", "run", "standalone"]
          ports:
            - name: grpc
              containerPort: 19530
            - name: metrics
              containerPort: 9091
          env:
            - name: ETCD_ENDPOINTS
              value: aurora-etcd:2379
            - name: MINIO_ADDRESS
              value: aurora-minio:9000

          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 20
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3

          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 4Gi

          volumeMounts:
            - name: milvus-data
              mountPath: /var/lib/milvus

      volumes:
        - name: milvus-data
          persistentVolumeClaim:
            claimName: aurora-milvus-data

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: aurora-milvus-data
  namespace: aurora
  labels:
    app.kubernetes.io/name: aurora-milvus
    app.kubernetes.io/component: vector
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 30Gi
