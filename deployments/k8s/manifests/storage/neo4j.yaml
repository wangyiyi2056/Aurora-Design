# ──────────────────────────────────────────────────────────────────────
# Neo4j StatefulSet (Knowledge Graph Storage)
#
# Deploys Neo4j 5 Community Edition as a StatefulSet.
# For production clusters, use Neo4j Enterprise with the
# Neo4j Kubernetes Operator.
# ──────────────────────────────────────────────────────────────────────

# ── Secret ───────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: aurora-neo4j-secret
  namespace: aurora
  labels:
    app.kubernetes.io/name: aurora-neo4j
    app.kubernetes.io/component: graph
type: Opaque
data:
  # echo -n 'aurora_neo4j' | base64
  NEO4J_PASSWORD: YXVyb3JhX25lbzRq

---
# ── Headless Service ─────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: aurora-neo4j-headless
  namespace: aurora
  labels:
    app.kubernetes.io/name: aurora-neo4j
    app.kubernetes.io/component: graph
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: aurora-neo4j
    app.kubernetes.io/component: graph
  ports:
    - name: bolt
      port: 7687
      targetPort: 7687
    - name: http
      port: 7474
      targetPort: 7474

---
# ── Client-facing Service ────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: aurora-neo4j
  namespace: aurora
  labels:
    app.kubernetes.io/name: aurora-neo4j
    app.kubernetes.io/component: graph
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: aurora-neo4j
    app.kubernetes.io/component: graph
  ports:
    - name: bolt
      port: 7687
      targetPort: 7687
    - name: http
      port: 7474
      targetPort: 7474

---
# ── StatefulSet ──────────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: aurora-neo4j
  namespace: aurora
  labels:
    app.kubernetes.io/name: aurora-neo4j
    app.kubernetes.io/component: graph
spec:
  serviceName: aurora-neo4j-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aurora-neo4j
      app.kubernetes.io/component: graph
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aurora-neo4j
        app.kubernetes.io/component: graph
    spec:
      terminationGracePeriodSeconds: 120
      securityContext:
        fsGroup: 7474
        runAsUser: 7474
        runAsGroup: 7474
      containers:
        - name: neo4j
          image: neo4j:5-community
          ports:
            - name: bolt
              containerPort: 7687
            - name: http
              containerPort: 7474
          env:
            - name: NEO4J_AUTH
              valueFrom:
                secretKeyRef:
                  name: aurora-neo4j-secret
                  key: NEO4J_PASSWORD
              # NEO4J_AUTH format: "neo4j/<password>"
            - name: NEO4J_AUTH_OVERRIDE
              value: "neo4j/$(NEO4J_AUTH)"
            - name: NEO4J_server_memory_heap_initial__size
              value: "256m"
            - name: NEO4J_server_memory_heap_max__size
              value: "512m"
            - name: NEO4J_server_memory_pagecache_size
              value: "256m"
            - name: NEO4J_PLUGINS
              value: "[]"

          livenessProbe:
            tcpSocket:
              port: bolt
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3

          readinessProbe:
            tcpSocket:
              port: bolt
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 2Gi

          volumeMounts:
            - name: neo4j-data
              mountPath: /data
            - name: neo4j-logs
              mountPath: /logs

      volumes:
        - name: neo4j-logs
          emptyDir: {}

  volumeClaimTemplates:
    - metadata:
        name: neo4j-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: standard
        resources:
          requests:
            storage: 20Gi
