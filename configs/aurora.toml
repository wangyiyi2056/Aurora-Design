# host = "localhost"
# port = 3306
# user = "root"
# password = ""
# database = "aurora"
# description = "Aurora MySQL database"

# ── Per-Role LLM Bindings ──
# Each role can be bound to a different model / adapter.
# Fields: model (or model_name), model_type, api_key, api_base,
#         temperature, max_tokens, max_async, timeout.
# Env var overrides: AURORA_LLM_<ROLE>_<FIELD>
#   e.g. AURORA_LLM_EXTRACT_API_KEY, AURORA_LLM_QUERY_TEMPERATURE
# Roles left unconfigured fall back to the default LLM.
#
# [llm_roles.extract]
# model = "gpt-4"
# model_type = "openai"
# api_base = "https://api.openai.com/v1"
# temperature = 0.3
# max_tokens = 4096
# max_async = 4

