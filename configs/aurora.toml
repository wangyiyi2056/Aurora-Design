app_name = "Aurora"
debug = true
host = "0.0.0.0"
port = 8888
default_llm = "gpt-4o-mini"

[[llm_configs]]
model_name = "gpt-4o-mini"
model_type = "openai"
api_base = "https://api.openai.com/v1"
# api_key = "sk-xxx"  # Prefer env var OPENAI_API_KEY
temperature = 0.7
max_tokens = 2048

# ── Default Datasource Configurations ──

# SQLite in-memory database (always available)
default_datasource = "aurora-sqlite"

[[datasource_configs]]
name = "aurora-sqlite"
db_type = "sqlite"
database = ":memory:"
description = "Aurora default SQLite in-memory database"

# DuckDB for analytics (file-based)
[[datasource_configs]]
name = "aurora-duckdb"
db_type = "duckdb"
database = "data/aurora.duckdb"
description = "Aurora DuckDB analytical database"

# Example PostgreSQL connection (requires actual server)
# [[datasource_configs]]
# name = "aurora-postgres"
# db_type = "postgresql"
# host = "localhost"
# port = 5432
# user = "postgres"
# password = ""
