app_name = "ChatBI"
debug = true
host = "0.0.0.0"
port = 8888
default_llm = "gpt-4o-mini"

[[llm_configs]]
model_name = "gpt-4o-mini"
model_type = "openai"
api_base = "https://api.openai.com/v1"
# api_key = "sk-xxx"  # Prefer env var CHATBI_API_KEY
temperature = 0.7
max_tokens = 2048

